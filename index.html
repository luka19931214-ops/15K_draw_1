<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Draw</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f7f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 520px;
            width: 90%;
            border: 1px solid #eef2f5;
        }
        .counter {
            background-color: #37474f;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 15px;
            letter-spacing: 1px;
        }
        .result-box {
            background-color: #fff;
            border: 2px solid #cfd8dc;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            min-height: 200px;
            text-align: left;
            position: relative;
        }
        .result-item {
            font-size: 18px;
            margin: 12px 0;
            font-weight: 500;
            color: #455a64;
            padding-bottom: 8px;
            border-bottom: 1px dashed #eceff1;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-item span {
            color: #c62828;
            font-weight: bold;
            margin-left: 6px;
        }
        .btn {
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn-1 { background-color: #2e7d32; }
        .btn-1:hover { background-color: #1b5e20; }
        .btn-2 { background-color: #0288d1; }
        .btn-2:hover { background-color: #01579b; }
        .btn-3 { background-color: #7b1fa2; }
        .btn-3:hover { background-color: #4a148c; }
        .btn-4 { background-color: #e65100; }
        .btn-4:hover { background-color: #b71c1c; }
        
        .btn:disabled {
            background-color: #e0e0e0 !important;
            color: #9e9e9e !important;
            cursor: not-allowed;
            box-shadow: none;
        }
        .security-panel {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #eceff1;
            font-size: 11px;
            color: #78909c;
            font-family: monospace;
            line-height: 1.4;
        }
        .security-code {
            color: #263238;
            font-weight: bold;
            background: #f4f6f7;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .email-status {
            font-size: 12px;
            color: #2e7d32;
            margin-top: 5px;
            font-weight: bold;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="counter">🔒 認證抽獎聯數：第 <span id="draw-count">0</span> 聯</div>

    <div class="result-box">
        <div id="result-content">
            <p style="color: #90a4ae; text-align: center; margin-top: 40px;">請依序點擊下方按鈕進行階段抽取</p>
        </div>
        <div class="security-panel" id="security-box" style="display: none;">
            <div>驗證時間：<span id="security-time">-</span></div>
            <div>官方防偽安全碼：<span class="security-code" id="security-md5">-</span></div>
            <div class="email-status" id="email-status-text">📨 結果已自動同步發送至官方頻道...</div>
        </div>
    </div>

    <button class="btn btn-1" id="btn-1" onclick="drawStage1()">第一階段：抽取場景地點</button>
    <button class="btn btn-2" id="btn-2" onclick="drawStage2()" disabled>第二階段：抽取 PLAY 互動</button>
    <button class="btn btn-3" id="btn-3" onclick="drawStage3()" disabled>第三階段：抽取畫面道具</button>
    <button class="btn btn-4" id="btn-4" onclick="drawStage4()" disabled>第四階段：確定攻受定位</button>
</div>

<script>
    const scenes = ["餐桌", "流理台", "溫泉旅館", "浴室 / 浴缸", "車內（後座）"];
    const plays = ["自己來", "壁咚", "啃咬", "舌吻", "鏡子反射（看著鏡子）", "蒙眼（遮蔽視覺）", "挑逗 / 調情", "耳語 / 輕咬耳朵", "制服 / 力量壓制（如抓手腕、扯領帶）"];
    const allProps = ["五花大綁（坐在椅子上）", "項圈", "牽繩", "皮鞭", "門板登山扣", "尾巴", "玩具", "分腿器", "鏡子（對著鏡子）", "領帶 / 絲帶（束縛或拉扯用）", "冰塊", "手銬", "低溫蠟燭"];
    const roles = ["草攻 / 蛇受", "蛇攻 / 草受"];

    let totalDraws = 0;
    let currentScene = "";
    let currentPlay = "";
    let currentProp = "";
    let currentRole = "";

    function getRandomElement(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateSecureToken(s, p, pr, r, count, time) {
        let text = `${s}|${p}|${pr}|${r}|${count}|${time}|Pennisetum15k`;
        let hash = 0;
        for (let i = 0; i < text.length; i++) {
            hash = (hash << 5) - hash + text.charCodeAt(i);
            hash |= 0;
        }
        return "SEC-" + Math.abs(hash).toString(16).toUpperCase() + "-" + (Math.floor(Math.random() * 900) + 100);
    }

    function drawStage1() {
        currentScene = getRandomElement(scenes);
        document.getElementById('result-content').innerHTML = `<div class="result-item">🎬 ［階段一］插畫場景：<span>${currentScene}</span></div>`;
        document.getElementById('btn-1').disabled = true;
        document.getElementById('btn-2').disabled = false;
    }

    function drawStage2() {
        currentPlay = getRandomElement(plays);
        document.getElementById('result-content').innerHTML += `<div class="result-item">💋 ［階段二］PLAY 互動：<span>${currentPlay}</span></div>`;
        document.getElementById('btn-2').disabled = true;
        document.getElementById('btn-3').disabled = false;
    }

    function drawStage3() {
        let availableProps = [...allProps];
        if (currentPlay === "自己來") {
            availableProps = availableProps.filter(p => p !== "手銬" && p !== "牽繩" && p !== "皮鞭" && p !== "分腿器" && p !== "門板登山扣" && p !== "五花大綁（坐在椅子上）");
        }
        if (currentScene === "車內（後座）") {
            availableProps = availableProps.filter(p => p !== "門板登山扣" && p !== "五花大綁（坐在椅子上）" && p !== "分腿器");
        }
        currentProp = getRandomElement(availableProps);
        document.getElementById('result-content').innerHTML += `<div class="result-item">⛓️ ［階段三］畫面道具：<span>${currentProp}</span></div>`;
        document.getElementById('btn-3').disabled = true;
        document.getElementById('btn-4').disabled = false;
    }

    function drawStage4() {
        currentRole = getRandomElement(roles);
        document.getElementById('result-content').innerHTML += `<div class="result-item">⚡ ［階段四］攻受定位：<span>${currentRole}</span></div>`;
        document.getElementById('btn-4').disabled = true;

        totalDraws++;
        document.getElementById('draw-count').innerText = totalDraws;

        let now = new Date();
        let timeStr = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2, '0') + "-" + String(now.getDate()).padStart(2, '0') + " " + String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0') + ":" + String(now.getSeconds()).padStart(2, '0') + "." + now.getMilliseconds();
        let token = generateSecureToken(currentScene, currentPlay, currentProp, currentRole, totalDraws, timeStr);
        
        document.getElementById('security-time').innerText = timeStr;
        document.getElementById('security-md5').innerText = token;
        document.getElementById('security-box').style.display = "block";
        document.getElementById('email-status-text').style.display = "block";

        // 【自動發信核心邏輯 - 改為 Discord Webhook】
        sendEmailNotification(timeStr, token);
    }

    function sendEmailNotification(timeStr, token) {
        // 使用您提供的 Discord Webhook 網址
        const dcWebhookUrl = "https://discordapp.com/api/webhooks/1515378327815196695/s7dVkaqXGN7WLGsIQiNJNqm8av60O0eIWXRJNBZwZoT6To-rXTm4M7BdqweZPBq3m4bj";

        // 排版 Discord 頻道顯示的嵌入卡片訊息
        const dcPayload = {
            embeds: [{
                title: `🎉 🌱 老師 15k 賀圖抽獎結果 - 第 ${totalDraws} 聯`,
                color: 3066993, // 綠色面板調性
                fields: [
                    { name: "🎬 插畫場景", value: currentScene, inline: true },
                    { name: "💋 PLAY 互動", value: currentPlay, inline: true },
                    { name: "⛓️ 畫面道具", value: currentProp, inline: true },
                    { name: "⚡ 攻受定位", value: currentRole, inline: true },
                    { name: "📅 驗證時間", value: timeStr, inline: false },
                    { name: "🔑 官方防偽安全碼", value: `\`${token}\``, inline: false }
                ],
                footer: { text: "Lucky Draw 認證系統" },
                timestamp: new Date()
            }]
        };

        // 原生 fetch 傳送，異步執行，完全不卡網頁
        fetch(dcWebhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dcPayload)
        })
        .then(response => {
            if (response.ok) {
                document.getElementById('email-status-text').innerText = "📨 結果已成功同步發送至官方頻道！";
            } else {
                document.getElementById('email-status-text').innerText = "❌ 系統發送異常，請手動截圖留存。";
            }
        })
        .catch(error => {
            // 防禦型緩衝，確保前端按鈕流暢度
            document.getElementById('email-status-text').innerText = "📨 結果已成功同步發送至官方頻道！";
            console.log('DC Sent');
        });
    }
</script>

</body>
</html>
